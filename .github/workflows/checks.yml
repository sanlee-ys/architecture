name: Checks

on:
  push:
  pull_request:

jobs:
  decision-log:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # The drift classes this catches were previously found by a manual audit
      # that cost 35 agents and 2.8M tokens: a doc with no row in the log table,
      # a table status contradicting the document's own header for three weeks,
      # unresolvable cross-links, and an empty Alternatives table on a decision
      # that is supposed to have foreclosed something. All mechanically checkable.
      # This is SYS-018's pattern turned on the decision log itself.
      - name: Lint the decision log
        run: python scripts/lint_decision_log.py

      # Three narrative surfaces here were quoting the classifier's v2 numbers a day
      # after v3.0.0 shipped. The portfolio already guarded its own copies of these
      # figures, but that check reads HTML spans in a different repo, so it had no
      # reach into Markdown prose here. Same failure, same fix, one repo over.
      #
      # Fetches the producer's published artifact, so it warns-and-passes on a network
      # failure rather than reddening an unrelated build.
      - name: Check prose metrics against the classifier artifact
        run: python scripts/check_program_metrics.py
